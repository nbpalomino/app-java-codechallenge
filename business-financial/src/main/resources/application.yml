debug: true
server.port: 8080

app:
  kafka:
    topic-request: transaction.request
    topic-result: transaction.result

spring:
  application.name: business-financial
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/financial_db
    username: postgres
    password: postgres
    pool:
      enabled: true
      initial-size: 20
      max-size: 100
      max-acquire-time: 5s
      validation-query: "SELECT 1"
  data:
    r2dbc:
      repositories:
        enabled: true
    redis:
      client-name: financial-transaction-cache
      host: localhost
      port: 6379
      database: 0
      connect-timeout: 2s
      lettuce:
        pool:
          enabled: true
          max-active: 100
          max-idle: 100
          min-idle: 5
        shutdown-timeout: 100ms
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: business-financial-group
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.yape.shared.domain.TransactionData
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
logging:
  level:
    org.springframework.boot:
      autoconfigure:
        logging:
          ConditionEvaluationReportLogger: INFO